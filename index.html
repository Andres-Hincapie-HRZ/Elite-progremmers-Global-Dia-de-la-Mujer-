<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día de la Mujer - Elite Programmers Global</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="card-container">
        <div class="card" id="card">
            <!-- Frente de la tarjeta -->
            <div class="card-face card-front">
                <img src="img.png" alt="Día de la Mujer">
                <button class="btn-flip" id="btnFlip">
                    ✨ Tócame ✨
                </button>
            </div>
            
            <!-- Reverso de la tarjeta -->
            <div class="card-face card-back">
                <div class="content">
                    <div class="icon">🌹</div>
                    <h1>¡Feliz Día de la Mujer!</h1>
                    <div class="line"></div>
                    <p>A todas las mujeres programadoras que con su <span>talento</span>, <span>dedicación</span> y <span>pasión</span> transforman el mundo de la tecnología.</p>
                    <p>Celebramos tu fuerza, inteligencia y capacidad de romper barreras.</p>
                    <div class="quote">"El código no tiene género, pero las mujeres le dan alma"</div>
                    <p class="signature">💜 Elite Programmers Global 💜</p>
                    <button class="btn-flip" id="btnBack">← Volver</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
